<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>styled-log-ts — Playground</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="playground">
      <header class="toolbar">
        <div class="examples">
          <button id="example-basic" class="btn example" data-testid="example-basic">Basic</button>
          <button id="example-colors" class="btn example" data-testid="example-colors">
            Colors
          </button>
          <button id="example-chaining" class="btn example" data-testid="example-chaining">
            Chaining
          </button>
          <button id="example-levels" class="btn example" data-testid="example-levels">
            Levels
          </button>
        </div>
        <div class="actions">
          <a
            href="https://www.npmjs.com/package/styled-log-ts"
            target="_blank"
            rel="noopener noreferrer"
            class="btn icon"
            title="styled-log-ts on NPM"
          >
            <svg viewBox="0 0 576 512" aria-hidden="true" width="22" height="22" fill="#CB3837">
              <path
                d="M288 288h-32v-64h32v64zm288-128v192H288v32H160v-32H0V160h576zm-416 32H32v128h64v-96h32v96h32V192zm160 0H192v160h64v-32h64V192zm224 0H352v128h64v-96h32v96h32v-96h32v96h32V192z"
              />
            </svg>
          </a>
          <a
            href="https://github.com/jankayala/styled-log-ts"
            target="_blank"
            rel="noopener noreferrer"
            class="btn icon"
            title="styled-log-ts on GitHub"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" width="20" height="20" fill="currentColor">
              <path
                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
              />
            </svg>
          </a>
          <button id="theme-toggle" class="btn icon" title="Toggle theme" aria-label="Toggle theme">
            <svg class="sun-and-moon" aria-hidden="true" width="22" height="22" viewBox="0 0 24 24">
              <mask class="moon" id="moon-mask">
                <rect x="0" y="0" width="100%" height="100%" fill="white" />
                <circle cx="24" cy="10" r="6" fill="black" />
              </mask>
              <circle
                class="sun"
                cx="12"
                cy="12"
                r="6"
                mask="url(#moon-mask)"
                fill="currentColor"
              />
              <g class="sun-beams" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </g>
            </svg>
          </button>
          <button id="run-button" class="btn primary" data-testid="run-button">Run</button>
        </div>
      </header>

      <main class="layout">
        <div id="editor" class="editor section" data-testid="editor-pane"></div>
        <div
          id="terminal"
          class="terminal section"
          data-testid="terminal-pane"
          aria-live="polite"
        ></div>
      </main>
    </div>

    <!-- Monaco loader -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@latest/min/vs/loader.js"></script>

    <!-- Polyfill Node.js variables so the NPM package doesn't crash the browser -->
    <script>
      window.process = {
        env: { FORCE_COLOR: "1" },
        stdout: { isTTY: true },
      };
    </script>
    <script type="module">
      import * as StyledLog from "https://esm.sh/styled-log-ts@latest";

      window.StyledLogBrowser = StyledLog;
    </script>
    <script src="js/ansiParser.js"></script>
    <script src="js/snippets.js"></script>
    <!-- Use type="module" for sandbox.js so it can await our module load if needed, but since it's deferred it will work usually or we can just keep it standard and rely on the async race OR wait we shouldn't race. Better to load it sequentially. -->
    <script type="module">
      await import("https://esm.sh/styled-log-ts@latest"); // Ensure the library is loaded before sandbox runs
      const sandboxPlugin = document.createElement("script");
      sandboxPlugin.src = "js/sandbox.js";
      document.body.appendChild(sandboxPlugin);
    </script>
  </body>
</html>
